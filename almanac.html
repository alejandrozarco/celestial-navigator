<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Almanac Page Generator</title>
<link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06091a;--s1:#0b1028;--s2:#0f1735;
  --b1:#1a3258;--acc:#c8a84b;--acc2:#8a6e2a;
  --tx1:#ddd5bc;--tx2:#7a8fa8;--tx3:#3d5470;
  --serif:'STIX Two Text','Computer Modern Serif','Times New Roman',serif;
  --mono:'Share Tech Mono','Courier New',monospace;
}
html,body{min-height:100%}
body{background:var(--bg);color:var(--tx1);font-family:var(--serif);font-size:14px}

/* ─── CONTROLS ─── */
.ctrl{background:var(--s1);border-bottom:1px solid var(--b1);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ctrl h1{font-size:18px;color:var(--acc);letter-spacing:3px;font-weight:600}
.ctrl input,.ctrl button,.ctrl select{font-family:var(--mono);font-size:14px;padding:5px 10px;background:var(--s2);border:1px solid var(--b1);color:var(--tx1);cursor:pointer}
.ctrl input:focus,.ctrl select:focus{border-color:var(--acc2);outline:none}
.ctrl button{border-color:var(--acc);color:var(--acc);letter-spacing:1px}
.ctrl button:hover{background:rgba(200,168,75,0.12)}
.ctrl .spacer{flex:1}

/* ─── PAGE ─── */
.page{max-width:1400px;margin:16px auto;padding:0 16px}
.page-title{font-family:var(--serif);font-size:16px;font-weight:700;text-align:center;color:var(--acc);letter-spacing:2px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--b1)}
.page-sub{text-align:center;color:var(--tx2);font-size:13px;margin-bottom:14px}

/* ─── TABLES ─── */
.tbl-wrap{overflow-x:auto}
table{border-collapse:collapse;font-family:var(--mono);font-size:12px;white-space:nowrap}
th{background:var(--s1);color:var(--acc2);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 6px;border:1px solid var(--b1);position:sticky;top:0;z-index:1}
td{padding:2px 6px;border:1px solid rgba(26,50,88,0.3);text-align:right;color:var(--tx1)}
tr:nth-child(6n+1) td{border-top:1px solid var(--b1)}
tr.hour td{background:rgba(200,168,75,0.04);font-weight:700}
td.lbl{text-align:left;color:var(--tx2);font-size:11px}

/* ─── LAYOUT ─── */
.ephem-row{display:flex;gap:12px;margin-bottom:14px}
.ephem-half{flex:1;overflow:auto;max-height:80vh;min-width:0}
.ephem-half table{width:100%}
.side-row{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.side-col{flex:1;min-width:300px}
.side-col table{width:100%}
.sec-hdr{font-family:var(--serif);font-size:13px;font-weight:700;color:var(--acc);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--b1)}

/* ─── STAR TABLE ─── */
.star-tbl td{padding:2px 5px}
.star-tbl td.star-name{text-align:left;color:var(--tx1);font-family:var(--serif);font-style:italic}
.star-tbl td.star-mag{color:var(--tx3);text-align:center}

/* ─── VALIDATION ─── */
.val-section{max-width:1400px;margin:20px auto;padding:0 16px}
.val-hdr{cursor:pointer;padding:8px 12px;background:var(--s1);border:1px solid var(--b1);color:var(--acc2);font-family:var(--mono);font-size:12px;letter-spacing:1px}
.val-body{padding:12px;background:var(--s2);border:1px solid var(--b1);border-top:none;font-family:var(--mono);font-size:12px;line-height:1.8;color:var(--tx2);display:none}
.val-body.open{display:block}
.val-ok{color:#52c98a}.val-warn{color:var(--acc)}.val-err{color:#e05252}
.val-body table{margin:8px 0}
.val-body td{padding:2px 8px}

/* ─── RISE/SET ─── */
.rs-polar{color:var(--acc);font-style:italic;font-size:10px}

/* ─── PRINT ─── */
@media print{
  body{background:#fff;color:#000}
  .ctrl{display:none}
  .val-section{display:none}
  th{background:#eee;color:#333;border-color:#999}
  td{color:#000;border-color:#ccc}
  tr.hour td{background:#f5f0e0}
  .page-title{color:#333}
  .sec-hdr{color:#333}
}
</style>
</head>

// ══════════════════════════════════════════════════════
//  JULIAN DATE
// ══════════════════════════════════════════════════════
function julianDate(d){
  let Y=d.getUTCFullYear(),M=d.getUTCMonth()+1,Dy=d.getUTCDate();
  const h=d.getUTCHours()+d.getUTCMinutes()/60+d.getUTCSeconds()/3600;
  if(M<=2){Y--;M+=12;}
  const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+Dy+B-1524.5+h/24;
}

// ══════════════════════════════════════════════════════
//  NUTATION — top 5 IAU 1980 terms (Meeus Ch. 22)
//  Returns {dpsi, deps} in degrees
// ══════════════════════════════════════════════════════
function nutation(date){
  const JD=julianDate(date);
  const T=(JD-2451545.0)/36525;
  const omega=mod360(125.04452-1934.136261*T);
  const Ls=mod360(280.4665+36000.7698*T);
  const D=mod360(297.8502+445267.1115*T);
  const F=mod360(93.2721+483202.0175*T);
  const oR=omega*R, LsR=Ls*R, DR=D*R, FR=F*R;
  const dpsi=(-17.20*Math.sin(oR)
              -1.32*Math.sin(2*(FR-DR+oR))
              -0.23*Math.sin(2*(FR+oR))
              +0.21*Math.sin(2*oR)
              +0.14*Math.sin(LsR))/3600;
  const deps=(9.20*Math.cos(oR)
             +0.57*Math.cos(2*(FR-DR+oR))
             +0.10*Math.cos(2*(FR+oR))
             -0.09*Math.cos(2*oR))/3600;
  return{dpsi,deps};
}

// ══════════════════════════════════════════════════════
//  GHA ARIES
// ══════════════════════════════════════════════════════
function ghaAries(date){
  const JD=julianDate(date);
  const Dn=JD-2451545.0;
  const T=Dn/36525;
  const gha=280.46061837+360.98564736629*Dn+0.000387933*T*T-T*T*T/38710000;
  // Equation of the equinoxes: GAST = GMST + dpsi*cos(eps)
  const nut=nutation(date);
  const eps=(23.439291-0.013004*T+nut.deps)*R;
  return mod360(gha+nut.dpsi*Math.cos(eps));
}

// ══════════════════════════════════════════════════════
//  SOLAR POSITION (low-precision Meeus, ~1' accuracy)
// ══════════════════════════════════════════════════════
function solarPosition(date){
  const JD=julianDate(date);
  const T=(JD-2451545.0)/36525;

  // Geometric mean longitude (Meeus eq 25.2)
  const L0=mod360(280.46646+36000.76983*T+0.0003032*T*T);
  // Mean anomaly (Meeus eq 25.3)
  const M=mod360(357.52911+35999.05029*T-0.0001537*T*T);
  const MR=M*R;

  // Equation of center (Meeus eq 25.6)
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(MR)
         +(0.019993-0.000101*T)*Math.sin(2*MR)
         +0.000289*Math.sin(3*MR);

  // Sun's true longitude
  const theta=L0+C;

  // Nutation and aberration (Meeus Chapter 25)
  const omega=mod360(125.04-1934.136*T);
  const omR=omega*R;
  const lambda=theta-0.00569-0.00478*Math.sin(omR);   // apparent longitude
  const eps0=23.439291-0.013004*T;                      // mean obliquity
  const eps=eps0+0.00256*Math.cos(omR);                 // apparent obliquity

  const lamR=lambda*R, epsR=eps*R;
  const ra=mod360(Math.atan2(Math.cos(epsR)*Math.sin(lamR),Math.cos(lamR))*D);
  const dec=Math.asin(Math.sin(epsR)*Math.sin(lamR))*D;
  const gha=mod360(ghaAries(date)-ra);     // GHA Sun = GHA Aries - RA
  const eot=((L0-0.00569-ra+180)%360+360)%360-180;
  return{ra,dec,gha,eot,L:L0,lambda};
}

// ══════════════════════════════════════════════════════
//  PRECESSION — J2000.0 to date (IAU 1976 + proper motion)
// ══════════════════════════════════════════════════════
function precessStar(star,date){
  const JD=julianDate(date);
  const T=(JD-2451545.0)/36525; // Julian centuries from J2000.0
  const yr=T*100; // years from J2000.0
  // Apply proper motion (arcsec/yr → degrees)
  const ra0=star.ra0+star.pmR/3600*yr/Math.cos(star.dec0*R);
  const dec0=star.dec0+star.pmD/3600*yr;
  // IAU 1976 precession angles (Lieske 1979), arcseconds
  const zA =(2306.2181*T+1.09468*T*T+0.018203*T*T*T)/3600*R;
  const zB =(2306.2181*T+0.30188*T*T+0.017998*T*T*T)/3600*R;
  const th =(2004.3109*T-0.42665*T*T-0.041833*T*T*T)/3600*R;
  // Convert to Cartesian
  const raR=ra0*R, decR=dec0*R;
  const x0=Math.cos(decR)*Math.cos(raR);
  const y0=Math.cos(decR)*Math.sin(raR);
  const z0=Math.sin(decR);
  // Rotation matrix P = R3(-z) · R2(θ) · R3(-ζ)  (Lieske, passive convention)
  const cosZA=Math.cos(zA),sinZA=Math.sin(zA);
  const cosZB=Math.cos(zB),sinZB=Math.sin(zB);
  const cosTh=Math.cos(th),sinTh=Math.sin(th);
  // Apply R3(-ζ): shift RA by +ζ
  const x1= cosZB*x0-sinZB*y0;
  const y1= sinZB*x0+cosZB*y0;
  const z1=z0;
  // Apply R2(θ): tilt pole
  const x2=cosTh*x1-sinTh*z1;
  const y2=y1;
  const z2=sinTh*x1+cosTh*z1;
  // Apply R3(-z): shift RA by +z
  const x3= cosZA*x2-sinZA*y2;
  const y3= sinZA*x2+cosZA*y2;
  const z3=z2;
  const dec=Math.asin(Math.max(-1,Math.min(1,z3)))*D;
  const ra=mod360(Math.atan2(y3,x3)*D);
  // Apply nutation (Meeus Eq. 23.1)
  const nut=nutation(date);
  const eps0=23.439291-0.013004*T;
  const eps=(eps0+nut.deps)*R;
  const raR2=ra*R, decR2=dec*R;
  const dRA=nut.dpsi*(Math.cos(eps)+Math.sin(eps)*Math.sin(raR2)*Math.tan(decR2))
            -nut.deps*Math.cos(raR2)*Math.tan(decR2);
  const dDec=nut.dpsi*Math.sin(eps)*Math.cos(raR2)+nut.deps*Math.sin(raR2);
  const raF=mod360(ra+dRA);
  const decF=dec+dDec;
  return{sha:mod360(360-raF), dec:decF, ra:raF};
}

// ══════════════════════════════════════════════════════
//  MOON POSITION — Meeus Ch.45 simplified lunar theory
// ══════════════════════════════════════════════════════

  const A3=mod360(313.45+481266.484*T);
  const E=1-0.002516*T-0.0000074*T*T;
  const E2=E*E;
  const LR=[
    [0,0,1,0, 6288774,-20905355],[2,0,-1,0, 1274027,-3699111],[2,0,0,0, 658314,-2955968],
    [0,0,2,0, 213618,-569925],[0,1,0,0, -185116,48888],[0,0,0,2, -114332,-3149],

    [2,-1,0,0, 45758,-204586],[0,1,-1,0, -40923,-129620],[1,0,0,0, -34720,108743],
    [0,1,1,0, -30383,104755],[2,0,0,-2, 15327,10321],[0,0,1,2, -12528,0],
    [0,0,1,-2, 10980,79661],[4,0,-1,0, 10675,-34782],[0,0,3,0, 10034,-23210],
    [4,0,-2,0, 8548,-21636],[2,1,-1,0, -7888,24208],[2,1,0,0, -6766,30824],
    [1,0,-1,0, -5163,-8379],[1,1,0,0, 4987,-16675],[2,-1,1,0, 4036,-12831],
    [2,0,2,0, 3994,-10445],[4,0,0,0, 3861,-11650],[2,0,-3,0, 3665,14403],
    [0,1,-2,0, -2689,-7003],[2,0,-1,2, -2602,0],[2,-1,-2,0, 2390,10056],
    [1,0,1,0, -2348,6322],[2,-2,0,0, 2236,-9884],[0,1,2,0, -2120,5751],
    [0,2,0,0, -2069,0],[2,-2,-1,0, 2048,-4950],[2,0,1,-2, -1773,4130],
    [2,0,0,2, -1595,0],[4,-1,-1,0, 1215,-3958],[0,0,2,2, -1110,0],
    [3,0,-1,0, -892,3258],[2,1,1,0, -810,2616],[4,-1,-2,0, 759,-1897],
    [0,2,-1,0, -713,-2117],[2,2,-1,0, -700,2354],[2,1,-2,0, 691,0],
    [2,-1,0,-2, 596,0],[4,0,1,0, 549,-1423],[0,0,4,0, 537,-1117],
    [4,-1,0,0, 520,-1571],[1,0,-2,0, -487,-1739],[2,1,0,-2, -399,0],
    [0,0,2,-2, -381,-4421],[1,1,1,0, 351,0],[3,0,-2,0, -340,0],
    [4,0,-3,0, 330,0],[2,-1,2,0, 327,0],[0,2,1,0, -323,1165],
    [1,1,-1,0, 299,0],[2,0,3,0, 294,0],[2,0,-1,-2, 0,8752],
  ];
  const B=[
    [0,0,0,1, 5128122],[0,0,1,1, 280602],[0,0,1,-1, 277693],[2,0,0,-1, 173237],
    [2,0,-1,1, 55413],[2,0,-1,-1, 46271],[2,0,0,1, 32573],[0,0,2,1, 17198],
    [2,0,1,-1, 9266],[0,0,2,-1, 8822],[2,-1,0,-1, 8216],[2,0,-2,-1, 4324],
    [2,0,1,1, 4200],[2,1,0,-1, -3359],[2,-1,-1,1, 2463],[2,-1,0,1, 2211],
    [2,-1,-1,-1, 2065],[0,1,-1,-1, -1870],[4,0,-1,-1, 1828],[0,1,0,1, -1794],
    [0,0,0,3, -1749],[0,1,-1,1, -1565],[1,0,0,1, -1491],[0,1,1,1, -1475],
    [0,1,1,-1, -1410],[0,1,0,-1, -1344],[1,0,0,-1, -1335],[0,0,3,1, 1107],
    [4,0,0,-1, 1021],[4,0,-1,1, 833],
  ];
  let sumL=0,sumR=0,sumB=0;
  for(const t of LR){
    const arg=(t[0]*Dm+t[1]*M+t[2]*Mp+t[3]*F)*R;
    let eF=1;
    if(Math.abs(t[1])===1)eF=E; else if(Math.abs(t[1])===2)eF=E2;
    sumL+=t[4]*eF*Math.sin(arg); sumR+=t[5]*eF*Math.cos(arg);
  }
  for(const t of B){
    const arg=(t[0]*Dm+t[1]*M+t[2]*Mp+t[3]*F)*R;
    let eF=1;
    if(Math.abs(t[1])===1)eF=E; else if(Math.abs(t[1])===2)eF=E2;
    sumB+=t[4]*eF*Math.sin(arg);
  }
  sumL+=3958*Math.sin(A1*R)+1962*Math.sin((Lp-F)*R)+318*Math.sin(A2*R);
  sumB+=-2235*Math.sin(Lp*R)+382*Math.sin(A3*R)+175*Math.sin((A1-F)*R)
       +175*Math.sin((A1+F)*R)+127*Math.sin((Lp-Mp)*R)-115*Math.sin((Lp+Mp)*R);
  const lambda=Lp+sumL/1000000;
  const beta=sumB/1000000;
  const dist=385000.56+sumR/1000;
  const nut=nutation(date);
  const lamCorr=lambda+nut.dpsi;
  const eps0=23.439291-0.013004*T;
  const eps=eps0+nut.deps;
  const lamR=lamCorr*R,betR=beta*R,epsR=eps*R;
  const ra=mod360(Math.atan2(Math.sin(lamR)*Math.cos(epsR)-Math.tan(betR)*Math.sin(epsR),Math.cos(lamR))*D);
  const dec=Math.asin(Math.sin(betR)*Math.cos(epsR)+Math.cos(betR)*Math.sin(epsR)*Math.sin(lamR))*D;
  const sha=mod360(360-ra);
  const gha=mod360(ghaAries(date)-ra);
  const HP=Math.asin(6378.14/dist)*D*60;
  const SD=0.2725*HP;
  return{ra,dec,sha,gha,dist,HP,SD,lambda:lamCorr};
}

// ══════════════════════════════════════════════════════
//  MOON PHASE & ILLUMINATION
// ══════════════════════════════════════════════════════
function moonPhase(date){
  const sun=solarPosition(date);
  const moon=moonPosition(date);
  const D=mod360(moon.lambda-sun.lambda);
  const illumination=(1-Math.cos(D*R))/2*100;
  const phase=D/360;
  const age=phase*29.53059;
  const NAMES=['New','Waxing Crescent','First Quarter','Waxing Gibbous',
               'Full','Waning Gibbous','Last Quarter','Waning Crescent'];
  const name=NAMES[Math.round(D/45)%8];
  return{phase,illumination,age,name};
}

// ══════════════════════════════════════════════════════
//  SUNRISE / SUNSET / TWILIGHT
//  Returns times in LMT (hours). null = polar day/night.
// ══════════════════════════════════════════════════════
function riseSet(dec_deg, lat_deg, h0_deg){
  const cosH=(sin(h0_deg)-sin(lat_deg)*sin(dec_deg))/(cos(lat_deg)*cos(dec_deg));
  if(cosH>1) return {neverRises:true};
  if(cosH<-1) return {neverSets:true};
  const H=Math.acos(cosH)*D; // hour angle in degrees
  return H/15; // hours from transit
}

function sunTimes(date, lat){
  // Solar position at ~noon UTC
  const noon=new Date(date);noon.setUTCHours(12,0,0,0);
  const sun=solarPosition(noon);
  const eotHr=sun.eot/15; // EoT in hours
  const transit=12-eotHr; // solar transit in LMT (hours)

  const rs=riseSet(sun.dec,lat,-0.8333); // sunrise/sunset: center -50'
  const ct=riseSet(sun.dec,lat,-6);      // civil twilight
  const nt=riseSet(sun.dec,lat,-12);     // nautical twilight

  const rsNum=typeof rs==='number';
  const ctNum=typeof ct==='number';
  const ntNum=typeof nt==='number';

  return{
    transit,
    rise:rsNum?transit-rs:null,
    set:rsNum?transit+rs:null,
    civTwlStart:ctNum?transit-ct:null,
    civTwlEnd:ctNum?transit+ct:null,
    nautTwlStart:ntNum?transit-nt:null,
    nautTwlEnd:ntNum?transit+nt:null,
    alwaysUp:!rsNum&&rs&&!!rs.neverSets,
    neverUp:!rsNum&&rs&&!!rs.neverRises,
  };
}

// ══════════════════════════════════════════════════════
//  BODY RISE/SET — single-pass for Sun/planets
// ══════════════════════════════════════════════════════
function bodyRiseSet(date, lat, posFn, h0){
  const noon=new Date(date);noon.setUTCHours(12,0,0,0);
  const pos=posFn(noon);
  const transit=12;
  const rs=riseSet(pos.dec,lat,h0);
  if(typeof rs==='object'){
    return{rise:null,set:null,transit,alwaysUp:!!rs.neverSets,neverUp:!!rs.neverRises};
  }
  return{rise:transit-rs,set:transit+rs,transit,alwaysUp:false,neverUp:false};
}

// ══════════════════════════════════════════════════════
//  FORMAT HELPERS
// ══════════════════════════════════════════════════════
function fmtDM(deg,dp=1){
  const a=Math.abs(deg);
  const d=Math.floor(a);
  const m=(a-d)*60;
  return`${String(d).padStart(3)}\u00b0${m.toFixed(dp).padStart(dp===0?2:4)}'`;
}

function fmtDMns(deg,dp=1){
  // With N/S prefix
  const ns=deg>=0?'N':'S';
  const a=Math.abs(deg);
  const d=Math.floor(a);
  const m=(a-d)*60;
  return`${ns}${String(d).padStart(2)}\u00b0${m.toFixed(dp).padStart(dp===0?2:4)}'`;
}

function fmtHM(hrs){
  if(hrs==null)return'----';
  const h=Math.floor(hrs);
  const m=Math.round((hrs-h)*60);
  if(m===60) return`${String(h+1).padStart(2,'0')}:00`;
  return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function dayOfYear(date){
  const start=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.floor((date-start)/(86400000))+1;
}

// ══════════════════════════════════════════════════════
//  GENERATE DAILY PAGE
// ══════════════════════════════════════════════════════
function generate(){
  const dateStr=document.getElementById('dateIn').value;
  const baseDate=new Date(dateStr+'T00:00:00Z');
  const year=baseDate.getUTCFullYear();
  const doy=dayOfYear(baseDate);
  const dayName=DAYS[baseDate.getUTCDay()];
  const monthName=MONTHS[baseDate.getUTCMonth()];
  const day=baseDate.getUTCDate();

  let html='';

  // ─── Title ───
  html+=`<div class="page-title">(DAY ${String(doy).padStart(3,'0')}) GREENWICH ALMANAC ${year} ${monthName} ${day} (${dayName})</div>`;
  html+=`<div class="page-sub">Sun &middot; Aries &middot; 58 Navigational Stars &middot; Sunrise/Sunset &middot; Precessed to ${year}.0</div>`;

  // ─── Ephemeris Table (AM + PM side by side) ───
  html+=`<div class="ephem-row">`;
  for(let half=0;half<2;half++){
    const startH=half*12;
    const label=half===0?'A.M. (00:00 \u2013 11:50)':'P.M. (12:00 \u2013 23:50)';
    html+=`<div class="ephem-half"><div class="sec-hdr">${label}</div>`;
    html+=`<table><thead><tr><th>UT</th><th colspan="2">SUN</th><th>ARIES</th></tr>`;
    html+=`<tr><th>h &nbsp; m</th><th>GHA</th><th>Dec</th><th>GHA</th></tr></thead><tbody>`;
    for(let h=startH;h<startH+12;h++){
      for(let m=0;m<60;m+=10){
        const dt=new Date(baseDate.getTime()+(h*60+m)*60000);
        const sun=solarPosition(dt);
        const aries=ghaAries(dt);
        const isHour=m===0;
        const cls=isHour?'class="hour"':'';
        const utStr=`${String(h).padStart(2,'0')} ${String(m).padStart(2,'0')}`;
        const decStr=isHour?fmtDMns(sun.dec):`<span style="color:var(--tx3)">\u00b7</span>`;
        html+=`<tr ${cls}><td class="lbl">${utStr}</td><td>${fmtDM(sun.gha)}</td><td>${decStr}</td><td>${fmtDM(aries)}</td></tr>`;
      }
    }
    // Rate row
    const noon=new Date(baseDate.getTime()+(startH+6)*3600000);
    const sunNoon=solarPosition(noon);
    html+=`<tr style="border-top:2px solid var(--b1)"><td class="lbl" style="color:var(--acc2)">Rate</td>`;
    html+=`<td style="color:var(--tx3)">${fmtDM(sunNoon.gha)}</td>`;
    html+=`<td style="color:var(--tx3)">${fmtDMns(sunNoon.dec)}</td>`;
    html+=`<td style="color:var(--tx3)">${fmtDM(ghaAries(noon))}</td></tr>`;
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;

  // ─── Stars + Sunrise/Sunset side by side ───
  html+=`<div class="side-row">`;

  // ── Star Table ──
  html+=`<div class="side-col"><div class="sec-hdr">Stars, ${year} (Precessed from J2000.0)</div>`;
  html+=`<table class="star-tbl"><thead><tr><th>No.</th><th>Name</th><th>Mag</th><th>SHA</th><th>Dec</th></tr></thead><tbody>`;
  const sortedStars=[...STARS].sort((a,b)=>a.n.localeCompare(b.n));
  const starEpoch=new Date(Date.UTC(year,0,1));
  sortedStars.forEach((s,i)=>{
    const p=precessStar(s,starEpoch);
    const magStr=s.mag.toFixed(1);
    html+=`<tr><td>${i+1}</td><td class="star-name">${s.n}${s.mag<=1.5?' \u2605':''}</td>`;
    html+=`<td class="star-mag">${magStr}</td><td>${fmtDM(p.sha,0)}</td><td>${fmtDMns(p.dec,0)}</td></tr>`;
  });
  html+=`</tbody></table></div>`;

  // ── Sunrise / Sunset / Twilight ──
  html+=`<div class="side-col"><div class="sec-hdr">Sunrise &middot; Sunset &middot; Twilight (LMT)</div>`;
  html+=`<table><thead><tr><th>Lat</th><th>Naut.<br>Twl.</th><th>Civil<br>Twl.</th><th>Sun<br>rise</th><th>Sun<br>set</th><th>Civil<br>Twl.</th><th>Naut.<br>Twl.</th></tr></thead><tbody>`;
  const lats=[72,68,66,64,62,60,58,56,54,52,50,45,40,35,30,20,10,0,-10,-20,-30,-35,-40,-45,-50,-55,-60];
  lats.forEach(lat=>{
    const st=sunTimes(baseDate,lat);
    const latStr=lat>=0?`N${lat}\u00b0`:`S${Math.abs(lat)}\u00b0`;
    const rise=st.alwaysUp?'<span class="rs-polar">\u25cb\u25cb</span>':st.neverUp?'<span class="rs-polar">\u25cf\u25cf</span>':fmtHM(st.rise);
    const set=st.alwaysUp?'<span class="rs-polar">\u25cb\u25cb</span>':st.neverUp?'<span class="rs-polar">\u25cf\u25cf</span>':fmtHM(st.set);
    const ctS=st.civTwlStart!=null?fmtHM(st.civTwlStart):'--';
    const ctE=st.civTwlEnd!=null?fmtHM(st.civTwlEnd):'--';
    const ntS=st.nautTwlStart!=null?fmtHM(st.nautTwlStart):'--';
    const ntE=st.nautTwlEnd!=null?fmtHM(st.nautTwlEnd):'--';
    html+=`<tr><td class="lbl">${latStr}</td><td>${ntS}</td><td>${ctS}</td><td>${rise}</td><td>${set}</td><td>${ctE}</td><td>${ntE}</td></tr>`;
  });
  html+=`</tbody></table>`;

  // EoT and Sun SD
  const noonSun=solarPosition(new Date(baseDate.getTime()+12*3600000));
  const eotMin=noonSun.eot*4;
  html+=`<div style="margin-top:10px;font-family:var(--mono);font-size:12px;color:var(--tx2)">`;
  html+=`<div>Eq. of Time: <span style="color:var(--tx1)">${eotMin>=0?'+':''}${eotMin.toFixed(1)} min</span></div>`;
  html+=`<div>Sun SD: <span style="color:var(--tx1)">16.0'</span></div>`;
  const mp=moonPhase(new Date(baseDate.getTime()+12*3600000));
  html+=`<div>Moon: <span style="color:var(--tx1)">${mp.name} \u2022 ${mp.illumination.toFixed(0)}% lit \u2022 age ${mp.age.toFixed(1)}d</span></div>`;
  html+=`<div>&#9675;&#9675; = continuous daylight &nbsp; &#9679;&#9679; = continuous darkness</div>`;
  html+=`</div></div>`;

  html+=`</div>`; // close side-row

  document.getElementById('output').innerHTML=html;
}

// ══════════════════════════════════════════════════════
//  VALIDATION — compare against Air Almanac 2026 values
// ══════════════════════════════════════════════════════
function validate(){
  const out=document.getElementById('valOut');
  let html='<div class="val-hdr" onclick="this.nextElementSibling.classList.toggle(\'open\')">&#9662; VALIDATION vs. AIR ALMANAC 2026 (click to toggle)</div>';
  html+='<div class="val-body open">';

  let pass=0,fail=0;
  function check(label,computed,expected,tolerance,unit='\''){
    const diff=Math.abs(computed-expected);
    const diffArcmin=diff*60;
    const ok=diff<=tolerance;
    if(ok)pass++;else fail++;
    const cls=ok?'val-ok':diff<=tolerance*2?'val-warn':'val-err';
    const sym=ok?'\u2713':'\u2717';
    html+=`<div class="${cls}">${sym} ${label}: computed ${computed.toFixed(4)}\u00b0, expected ${expected.toFixed(4)}\u00b0, diff ${diffArcmin.toFixed(1)}${unit} ${ok?'':'(OVER '+tolerance*60+'\')'}</div>`;
  }

  // ─── Reference: Day 001, Jan 1 2026 ───
  html+='<div style="color:var(--acc);margin:8px 0;font-weight:bold">Day 001 \u2014 January 1, 2026</div>';

  const jan1_0=new Date('2026-01-01T00:00:00Z');
  const jan1_6=new Date('2026-01-01T06:00:00Z');
  const jan1_12=new Date('2026-01-01T12:00:00Z');

  // GHA Aries
  check('GHA Aries 00:00',ghaAries(jan1_0),100+39.7/60,0.02);
  check('GHA Aries 06:00',ghaAries(jan1_6),190+54.5/60,0.02);
  check('GHA Aries 12:00',ghaAries(jan1_12),281+9.3/60,0.02);

  // Sun GHA
  const sun0=solarPosition(jan1_0);
  const sun6=solarPosition(jan1_6);
  const sun12=solarPosition(jan1_12);
  check('Sun GHA 00:00',sun0.gha,179+10.1/60,0.03);
  check('Sun GHA 06:00',sun6.gha,269+8.3/60,0.05);
  check('Sun GHA 12:00',sun12.gha,359+6.5/60,0.05);

  // Sun Dec
  check('Sun Dec 00:00',sun0.dec,-(23+1.0/60),0.02);

  // ─── Stars (precessed to 2026) ───
  html+='<div style="color:var(--acc);margin:12px 0 8px;font-weight:bold">Stars \u2014 Precessed to 2026-01-01 (Skyfield/DE440s reference)</div>';

  const epoch2026=new Date('2026-01-01T00:00:00Z');
  const starRef={
    'Acamar':{sha:315.185,dec:-40.200},
    'Arcturus':{sha:145.789,dec:19.044},
    'Sirius':{sha:258.427,dec:-16.753},
    'Vega':{sha:80.544,dec:38.802},
    'Capella':{sha:280.359,dec:45.881},
    'Aldebaran':{sha:290.639,dec:16.427},
    'Rigel':{sha:281.067,dec:-8.173},
    'Procyon':{sha:244.833,dec:5.156},
  };
  for(const[name,ref]of Object.entries(starRef)){
    const star=STARS.find(s=>s.n===name);
    if(!star)continue;
    const p=precessStar(star,epoch2026);
    check(`${name} SHA`,p.sha,ref.sha,0.05);
    check(`${name} Dec`,p.dec,ref.dec,0.05);
  }

  // ─── Day 085, March 26 2026 ───
  html+='<div style="color:var(--acc);margin:12px 0 8px;font-weight:bold">Day 085 \u2014 March 26, 2026</div>';
  const mar26_0=new Date('2026-03-26T00:00:00Z');
  check('GHA Aries Mar 26 00:00',ghaAries(mar26_0),183+27.4/60,0.02);
  const sunMar26=solarPosition(mar26_0);
  check('Sun GHA Mar 26 00:00',sunMar26.gha,178+33.1/60,0.05);
  check('Sun Dec Mar 26 00:00 (equinox \u2014 ~12\' expected)',sunMar26.dec,2+19.2/60,0.25);

  // ─── Summary ───
  html+=`<div style="margin-top:12px;padding:8px;border:1px solid var(--b1);background:var(--s1)">`;
  html+=`<span style="font-size:14px;color:${fail===0?'#52c98a':'var(--acc)'}">${pass} passed, ${fail} failed</span>`;
  html+=`</div>`;
  html+=`<div style="margin-top:8px;color:var(--tx3);font-size:11px;line-height:1.7">`;
  html+=`<div><b>Accuracy notes:</b></div>`;
  html+=`<div>\u2022 GHA Aries: &lt;0.2' \u2014 uses GMST polynomial (IAU)</div>`;
  html+=`<div>\u2022 Sun GHA: &lt;1' \u2014 Meeus Chapter 25 with nutation/aberration</div>`;
  html+=`<div>\u2022 Sun Dec near solstices: &lt;1' \u2014 excellent</div>`;
  html+=`<div>\u2022 Sun Dec near equinoxes: ~10-15' \u2014 simplified Kepler model lacks planetary perturbations (Venus, Jupiter). The Air Almanac uses JPL DE440 ephemeris with hundreds of periodic terms.</div>`;
  html+=`<div>\u2022 Star SHA/Dec: &lt;1' \u2014 J2000.0 + proper motion + IAU 1976 rigorous precession</div>`;
  html+=`</div>`;

  html+='</div>';
  out.innerHTML=html;
}

document.getElementById('dateIn').value=_now.getUTCFullYear()+'-'+String(_now.getUTCMonth()+1).padStart(2,'0')+'-'+String(_now.getUTCDate()).padStart(2,'0');

</script>
